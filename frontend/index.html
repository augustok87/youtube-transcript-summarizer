<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Summarizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Transcript Summarizer</h1>
            <p class="subtitle">Paste a YouTube URL, pick a summary style, and go.</p>
        </header>

        <form id="summarize-form">
            <div class="input-row">
                <input
                    type="url"
                    id="url-input"
                    placeholder="https://www.youtube.com/watch?v=... or https://rumble.com/..."
                    required
                    autocomplete="off"
                >
                <button type="submit" id="submit-btn">Summarize</button>
            </div>

            <div class="options-row">
                <div class="granularity-group">
                    <label for="granularity">Summary style:</label>
                    <select id="granularity">
                        <option value="one_liner">One-liner</option>
                        <option value="tldr" selected>TL;DR (bullet points)</option>
                        <option value="short">Short (1–2 paragraphs)</option>
                        <option value="detailed">Detailed (structured)</option>
                        <option value="chapters">Chapters</option>
                        <option value="custom">Custom instruction</option>
                    </select>
                </div>

                <div class="language-group">
                    <label for="output-language">Output language:</label>
                    <input
                        type="text"
                        id="output-language"
                        placeholder="auto (same as video)"
                        maxlength="5"
                    >
                </div>
            </div>

            <div id="custom-instruction-wrapper" class="hidden">
                <label for="custom-instruction">Custom instruction:</label>
                <textarea
                    id="custom-instruction"
                    placeholder="e.g. 'Focus only on technical details' or 'Explain like I'm 10 years old'"
                    rows="2"
                ></textarea>
            </div>
        </form>

        <section id="history-section" class="hidden">
            <button id="history-toggle" type="button">
                <span id="history-toggle-text">Recent searches</span>
                <span id="history-count" class="history-badge">0</span>
                <span id="history-chevron" class="chevron">&#9660;</span>
            </button>
            <div id="history-list" class="hidden"></div>
            <button id="history-clear" class="hidden" type="button">Clear history</button>
        </section>

        <div id="results-container"></div>
    </div>

    <template id="result-card-template">
        <article class="result-card" data-card-state="queued">
            <div class="card-header">
                <div class="card-header-info">
                    <span class="card-title">Loading...</span>
                    <span class="card-granularity"></span>
                    <span class="card-source-badge"></span>
                </div>
                <div class="card-header-actions">
                    <button class="card-collapse-btn" type="button" title="Collapse">&#9650;</button>
                    <button class="card-close-btn" type="button" title="Dismiss">&times;</button>
                </div>
            </div>
            <div class="card-body">
                <div class="card-status hidden">
                    <div class="spinner"></div>
                    <span class="card-status-text"></span>
                </div>
                <div class="card-metadata hidden">
                    <span class="card-meta-duration"></span>
                    <span class="card-meta-source"></span>
                    <span class="card-meta-tokens"></span>
                </div>
                <div class="card-summary-output hidden"></div>
            </div>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>
